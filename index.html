<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Coach Prototype</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="workspace">
    <aside class="app-rail" aria-label="アプリナビゲーション">
      <div class="rail-logo" aria-hidden="true">W</div>
      <button class="rail-item active" data-app="Chat"><span class="rail-icon chat-icon"></span><span>Chat</span></button>
      <button class="rail-item" data-app="Calendar"><span class="rail-icon cal-icon"></span><span>Calendar</span></button>
      <button class="rail-item" data-app="Slides"><span class="rail-icon slide-icon"></span><span>Slides</span></button>
      <button class="rail-item" data-app="Meeting"><span class="rail-icon meet-icon"></span><span>Meeting</span></button>
      <button class="rail-item" data-app="Record"><span class="rail-icon rec-icon"></span><span>Record</span></button>
    </aside>

    <section class="shell">
      <header class="top-bar">
        <div id="appName" class="app-name">Work Teams</div>
        <label class="search-box"><span>⌕</span><input type="search" placeholder="検索" aria-label="検索" /></label>
        <div class="user-dot" aria-label="ユーザー">本</div>
      </header>
      <main id="workMain" class="work-main" aria-live="polite"></main>
    </section>

    <button id="coachTab" class="coach-tab hidden" aria-label="AI Coachを開く">AI Coach</button>
    <aside id="coachPanel" class="coach-panel" aria-label="AI Coachパネル">
      <header class="coach-header">
        <div><strong>AI Coach</strong><span id="coachStatus">相談中</span></div>
        <div class="counter"><span id="stepCounter">1 / 5</span><button id="minimizeBtn" class="icon-btn" aria-label="閉じる">×</button></div>
      </header>
      <section id="coachContent" class="coach-content"></section>
      <footer class="coach-nav">
        <button id="prevBtn" class="ghost">戻る</button>
        <button id="nextBtn">次へ</button>
        <button id="skipBtn" class="ghost">スキップ</button>
      </footer>
    </aside>
  </div>
  <script src="script.js"></script>
</body>
</html>
