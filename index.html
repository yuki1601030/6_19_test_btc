<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Coach Prototype</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="workspace">
    <aside class="work-nav" aria-label="業務ナビゲーション">
      <div class="work-logo">W</div>
      <button class="nav-item active">チャット</button>
      <button class="nav-item">予定</button>
      <button class="nav-item">会議</button>
    </aside>

    <main id="workMain" class="work-main" aria-live="polite"></main>

    <button id="coachTab" class="coach-tab hidden" aria-label="AI Coachを開く">AI<br>Coach</button>

    <aside id="coachPanel" class="coach-panel" aria-label="AI Coachパネル">
      <header class="coach-header">
        <div>
          <strong>AI Coach</strong>
          <span id="coachStatus">相談中</span>
        </div>
        <div class="counter"><span id="stepCounter">1 / 5</span><button id="minimizeBtn" class="icon-btn" aria-label="最小化">−</button></div>
      </header>
      <section id="coachContent" class="coach-content"></section>
      <footer class="coach-nav">
        <button id="prevBtn" class="ghost">戻る</button>
        <button id="skipBtn" class="ghost">スキップ</button>
        <button id="nextBtn">次へ</button>
      </footer>
    </aside>
  </div>
  <script src="script.js"></script>
</body>
</html>
